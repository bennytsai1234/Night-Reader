flutter_native_splash:
  # 所有 Android 版本統一：原生 splash 為純深紫夜空色（取自藝術圖天空的平均色），
  # 不鋪背景圖也不放圖標；全螢幕夜空藝術圖由 Flutter 首幀的啟動轉場層在同色底上
  # 淡入浮現（見 features/welcome/main_page.dart），撐到書架首批書本載完再淡出交棒。
  # 全程只有漸變、沒有硬切。
  color: "#261940"
  color_dark: "#261940"

  android: true
  ios: false
  web: false

  # Android 12+ 系統啟動畫面預設會在正中間放 App 圖示；塞全透明圖把圖示拿掉。
  android_12:
    image: "assets/app_icon/splash_transparent.png"
    image_dark: "assets/app_icon/splash_transparent.png"
    color: "#261940"
    color_dark: "#261940"
    icon_background_color: "#261940"
    icon_background_color_dark: "#261940"
