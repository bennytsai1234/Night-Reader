flutter_native_splash:
  # 使用全螢幕風景背景圖片
  background_image: "assets/splash_landscape.png"
  background_image_dark: "assets/splash_landscape.png"

  # 背景色對齊書架底色（scaffoldBackground），原生 splash 撤除後直接交棒到書架，
  # 中間不經任何過場頁、也不露白底。

  android: true
  ios: false
  web: false

  # Android 12+ 系統對啟動圖有嚴格限制，保留此配置以避免新版 Android 上的自適應圖示邊緣殘白。
  android_12:
    color: "#1A1612"
    color_dark: "#1A1612"
    icon_background_color: "#1A1612"
    icon_background_color_dark: "#1A1612"
