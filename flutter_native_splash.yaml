flutter_native_splash:
  # 一段式啟動畫面：原生 splash 為主題色純色底（與書架 scaffold 背景一致，硬切交棒
  # 無跳色），由 main.dart 的 FlutterNativeSplash.preserve() 延後首幀，撐到書架首批
  # 書載完才放行（見 features/welcome/main_page.dart）。全程只有這一層原生畫面，
  # 沒有 Flutter 端轉場圖。
  color: "#F4EFE3"       # 亮主題 scaffold 背景（AppPalette.paper200）
  color_dark: "#1A1612"  # 暗主題 scaffold 背景（AppPalette.ink600）

  android: true
  ios: false
  web: false

  # Android 12+ 系統啟動畫面：純色底 + 置中 AVD 動畫圖示。動畫圖示不是本套件生成，
  # 而是手寫的 @drawable/splash_icon_avd（drawable/ 亮色變體 + drawable-night/ 暗色
  # 變體）。注意：重跑 `dart run flutter_native_splash:create` 會覆寫 values-v31 與
  # values-night-v31 的 styles.xml，之後需手動把下面兩行加回兩份 LaunchTheme：
  #   <item name="android:windowSplashScreenAnimatedIcon">@drawable/splash_icon_avd</item>
  #   <item name="android:windowSplashScreenAnimationDuration">1000</item>
  android_12:
    color: "#F4EFE3"
    color_dark: "#1A1612"
